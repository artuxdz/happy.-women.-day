<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Aghitouta 💗</title>
<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ffb6c1,#ffc0cb,#ffe4e1);
    font-family:Arial, Helvetica, sans-serif;
    overflow:hidden;
    position:relative;
}

#word{
    text-align:center;
    cursor:pointer;
    z-index:10;
    transition:all 0.4s ease;
}

.message{
    max-width:700px;
    text-align:center;
    padding:20px;
    font-size:16px; /* نص أصغر للسهولة */
    line-height:1.5;
    color:#fff;
    z-index:10;
}

/* تأثيرات متحركة للكلمات */
.word-effect{
    display:inline-block;
    animation:pop 0.5s ease forwards;
}

@keyframes pop{
    0%{transform:scale(0.5) rotate(-10deg); opacity:0;}
    50%{transform:scale(1.3) rotate(10deg); opacity:1; text-shadow:0 0 8px #fff;}
    100%{transform:scale(1) rotate(0deg); opacity:1;}
}

.effect{
    position:absolute;
    animation:move 6s linear infinite;
    opacity:0.6;
    user-select:none;
    pointer-events:none;
}

@keyframes move{
    0%{transform:translateY(0) rotate(0deg); opacity:0.6;}
    100%{transform:translateY(-900px) rotate(360deg); opacity:0;}
}
</style>
</head>
<body>

<div id="word"></div>

<script>
const words = [
"اااااي زين نتي نتي 🙂👋 وركي هناااا",
"وااا ضربييي الله يعطيك مصطفى 🙂💋",
"زيديي",
"زيديييي",
"زيدييييي",
"باقيي شويااا زيديييييي",
"زيديييييييييييييي",
"جات جات جات"
];

let index = 0;
let size = 25;

const wordDiv = document.getElementById("word");

// عرض كل كلمة مع تأثير حلو
function showWord(){
    if(index < words.length){
        wordDiv.innerHTML = `<span class="word-effect" style="font-size:${size}px">${words[index]}</span>`;
        size += 12;
        index++;
    }else{
        showEffects();
        explodeFinal();
        showFinalMessage();
    }
}

wordDiv.onclick = showWord;
showWord();

// تأثيرات القلوب والورود والقبلات المتحركة
function showEffects(){
    const symbols = ["💗","🌹","💋"];
    for(let i=0;i<40;i++){
        let span = document.createElement("div");
        span.className="effect";
        span.innerHTML = symbols[Math.floor(Math.random()*symbols.length)];
        span.style.left=Math.random()*window.innerWidth+"px";
        span.style.top=Math.random()*window.innerHeight+"px";
        span.style.fontSize=(Math.random()*25+15)+"px";
        span.style.animationDuration=(Math.random()*5+3)+"s";
        document.body.appendChild(span);
    }
}

// انفجار المفرقعات النهائي
function explodeFinal(){
    setTimeout(()=>{
        for(let i=0;i<100;i++){
            let span = document.createElement("div");
            span.className="effect";
            span.innerHTML = ["💗","💋","🌹"][Math.floor(Math.random()*3)];
            span.style.left=Math.random()*window.innerWidth+"px";
            span.style.top=Math.random()*window.innerHeight+"px";
            span.style.fontSize=(Math.random()*40+20)+"px";
            span.style.animationDuration=(Math.random()*2+1)+"s";
            document.body.appendChild(span);
        }
    },200);
}

// الرسالة النهائية مقسمة وصغيرة الحجم
function showFinalMessage(){
    wordDiv.onclick=null;
    wordDiv.className="message";
    wordDiv.innerHTML=`

`;
}

</script>
</body>
</html>
